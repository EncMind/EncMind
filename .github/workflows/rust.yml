name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Nightly all-features coverage check.
    - cron: "17 3 * * *"

permissions:
  contents: read

concurrency:
  group: rust-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  default:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.94
        components: rustfmt, clippy
    - name: Cache cargo artifacts
      uses: Swatinem/rust-cache@v2
    - name: Format check
      run: cargo fmt --all --check
    - name: Clippy
      run: cargo clippy --workspace --all-targets -- -D warnings
    - name: Doc check
      run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
    - name: Build
      run: cargo build --workspace --locked --verbose
    - name: Run tests
      run: cargo test --workspace --locked --verbose

  all-features:
    # Run broader feature-matrix lint/doc checks on main and nightly only.
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.94
        components: clippy
    - name: Cache cargo artifacts
      uses: Swatinem/rust-cache@v2
    - name: Clippy (all features)
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
    - name: Doc check (all features)
      run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps --locked
